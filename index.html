function buildAimsCSVText(){
  const rows = [['Applies To','Account','Subcategory','Target Amount (CHF)','Target Month','Target Year','Progress History']];
  state.aims.forEach(aim => {
    const acc = aimAccount(aim);
    const sub = aimSubcategory(aim);
    const [y,m] = aim.targetMonth.split('-');
    const history = aim.history.map(h => {
      const [hy,hm] = h.targetMonth.split('-');
      return csvNum(h.targetAmount) + '@' + MONTH_NAMES[parseInt(hm,10)-1] + ' ' + hy;
    }).join('; ');
    rows.push([
      sub ? 'Subcategory' : 'Account',
      acc ? acc.name : '',
      sub ? sub.name : '',
      csvNum(aim.targetAmount),
      MONTH_NAMES[parseInt(m,10)-1],
      y,
      history
    ]);
  });
  return '\ufeff' + rows.map(csvRow).join('\r\n') + '\r\n';
}
function exportAimsCSV(){
  const csv = buildAimsCSVText();
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'savings-aims-' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function parseAimsCSV(text){
  const rows = parseCSV(text);
  const aims = [];
  for(let i=1;i<rows.length;i++){
    const row = rows[i];
    if(!row[1]) continue;
    const applies = (row[0]||'').trim();
    const accName = (row[1]||'').trim();
    const subName = (row[2]||'').trim();
    const amount = parseFloat(row[3]);
    const monthLabel = (row[4]||'').trim();
    const yearLabel = (row[5]||'').trim();
    const mi = MONTH_NAMES.findIndex(mn => mn.toLowerCase() === monthLabel.toLowerCase());
    if(mi === -1 || isNaN(amount) || !yearLabel) continue;
    const acc = state.accounts.find(a => a.name === accName);
    if(!acc) continue;
    const sub = (applies === 'Subcategory' && subName) ? acc.subcategories.find(s => s.name === subName) : null;
    const history = [];
    if(row[6]){
      row[6].split(';').forEach(part => {
        const seg = part.trim();
        if(!seg) return;
        const at = seg.indexOf('@');
        if(at === -1) return;
        const amt = parseFloat(seg.slice(0, at).trim());
        const dateParts = seg.slice(at+1).trim().split(' ');
        if(dateParts.length < 2 || isNaN(amt)) return;
        const hmi = MONTH_NAMES.findIndex(mn => mn.toLowerCase() === dateParts[0].toLowerCase());
        if(hmi === -1) return;
        history.push({ targetAmount: amt, targetMonth: dateParts[1] + '-' + String(hmi+1).padStart(2,'0') });
      });
    }
    aims.push({ id: uid(), accountId: acc.id, subcategoryId: sub ? sub.id : null, targetAmount: amount, targetMonth: yearLabel + '-' + String(mi+1).padStart(2,'0'), history });
  }
  return aims;
}

let pendingAimsImport = null;
function handleImportAimsFile(event){
  const file = event.target.files[0];
  event.target.value = '';
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    let aims;
    try{ aims = parseAimsCSV(e.target.result); }
    catch(err){
      openModal('<p class="modal-title">Import failed</p><p class="modal-warn">The file couldn\u2019t be read.</p><div class="modal-actions"><button class="btn primary" onclick="closeModal()">Close</button></div>');
      return;
    }
    if(aims.length === 0){
      openModal('<p class="modal-title">No aims found</p><p class="modal-warn">Either the file is empty or none of the accounts/subcategories it references match what\u2019s in the app right now.</p><div class="modal-actions"><button class="btn primary" onclick="closeModal()">Close</button></div>');
      return;
    }
    pendingAimsImport = aims;
    openModal(
      '<p class="modal-title">Import aims</p>' +
      '<p class="modal-warn">Found ' + aims.length + ' ' + (aims.length === 1 ? 'aim' : 'aims') + '. This replaces all ' + state.aims.length + ' aim' + (state.aims.length === 1 ? '' : 's') + ' currently in the app.</p>' +
      '<div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn danger" onclick="confirmImportAims()">Replace aims</button></div>'
    );
  };
  reader.readAsText(file);
}
async function confirmImportAims(){
  if(!pendingAimsImport) return;
  state.aims = pendingAimsImport;
  pendingAimsImport = null;
  await saveData();
  closeModal();
  render();
}

// ============ Table cell editor (edit mode) ============

function openTableCellEditor(monthKey, accId, subId){
  if(!state.tableEditMode) return;
  const acc = getAccount(accId);
  if(!acc) return;
  const sub = subId ? getSub(acc, subId) : null;
  const list = sub ? sub.entries : acc.entries;
  const existingEntries = list.filter(e => e.month === monthKey);
  const amount = existingEntries.reduce((s,e) => s + (Number(e.amount)||0), 0);
  const note = existingEntries.map(e => e.note).filter(Boolean).join('; ');
  const [y,m] = monthKey.split('-');

  const accOptions = state.accounts.map(a => '<option value="' + a.id + '"' + (a.id === accId ? ' selected' : '') + '>' + escapeHtml(a.name) + '</option>').join('');

  openModal(
    '<p class="modal-title">Edit entry</p>' +
    '<div class="month-year-row">' +
      '<div class="field"><label>Month</label><select id="cellMonth">' + MONTH_NAMES.map((mn,i) => '<option value="' + (i+1) + '"' + (i+1 === parseInt(m,10) ? ' selected' : '') + '>' + mn + '</option>').join('') + '</select></div>' +
      '<div class="field"><label>Year</label><input id="cellYear" type="number" value="' + y + '" min="2015" max="2035"></div>' +
    '</div>' +
    '<div class="field"><label>Savings</label><select id="cellAccount" onchange="refreshCellSubOptions()">' + accOptions + '</select></div>' +
    '<div class="field" id="cellSubWrap">' + renderCellSubField(accId, subId) + '</div>' +
    '<div class="field"><label>Amount (CHF)</label><input id="cellAmount" type="number" step="0.01" value="' + (existingEntries.length ? amount : '') + '" placeholder="0.00"></div>' +
    '<div class="field"><label>Note (optional)</label><input id="cellNote" type="text" value="' + escapeHtml(note) + '"></div>' +
    '<div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="submitCellEdit(\'' + monthKey + '\',\'' + accId + '\',\'' + (subId || '') + '\')">Save</button></div>'
  );
}
function renderCellSubField(accId, selectedSubId){
  const acc = getAccount(accId);
  if(!acc || acc.subcategories.length === 0){
    return '<label>Subcategory</label><select id="cellSub" disabled><option>Whole account</option></select>';
  }
  let html = '<label>Subcategory</label><select id="cellSub">';
  acc.subcategories.forEach(s => {
    html += '<option value="' + s.id + '"' + (s.id === selectedSubId ? ' selected' : '') + '>' + escapeHtml(s.name) + '</option>';
  });
  html += '</select>';
  return html;
}
function refreshCellSubOptions(){
  const accId = document.getElementById('cellAccount').value;
  document.getElementById('cellSubWrap').innerHTML = renderCellSubField(accId, null);
}

let pendingCellEdit = null;

async function submitCellEdit(origMonthKey, origAccId, origSubId){
  const m = parseInt(document.getElementById('cellMonth').value, 10);
  const y = parseInt(document.getElementById('cellYear').value, 10);
  const targetAccId = document.getElementById('cellAccount').value;
  const targetAcc = getAccount(targetAccId);
  const subSelect = document.getElementById('cellSub');
  const targetSubId = (targetAcc.subcategories.length > 0 && subSelect && !subSelect.disabled) ? subSelect.value : null;
  const amountRaw = document.getElementById('cellAmount').value;
  const note = document.getElementById('cellNote').value.trim();
  if(!y || amountRaw.trim() === '') return;
  const amount = parseFloat(amountRaw);
  if(isNaN(amount) || !targetAcc) return;
  const targetMonthKey = y + '-' + String(m).padStart(2,'0');

  const moved = (targetAccId !== origAccId) || ((targetSubId||'') !== (origSubId||'')) || (targetMonthKey !== origMonthKey);
  const targetList = targetSubId ? getSub(targetAcc, targetSubId).entries : targetAcc.entries;
  const existingAtTarget = targetList.filter(e => e.month === targetMonthKey);
  const existingTargetTotal = existingAtTarget.reduce((s,e) => s + (Number(e.amount)||0), 0);

  const edit = { origMonthKey, origAccId, origSubId: origSubId || null, targetMonthKey, targetAccId, targetSubId, amount, note };

  if(moved && existingTargetTotal !== 0){
    pendingCellEdit = edit;
    const targetLabel = targetSubId ? getSub(targetAcc, targetSubId).name : targetAcc.name;
    openModal(
      '<p class="modal-title">' + escapeHtml(targetLabel) + ' already has CHF ' + fmtCHFRound(existingTargetTotal) + ' for ' + fmtMonth(targetMonthKey) + '</p>' +
      '<p class="modal-warn">How should this be combined?</p>' +
      '<div class="modal-actions" style="flex-direction:column;">' +
        '<button class="btn primary" style="width:100%;margin-bottom:8px;" onclick="resolveCellConflict(\'sum\')">Sum both amounts</button>' +
        '<button class="btn danger" style="width:100%;margin-bottom:8px;" onclick="resolveCellConflict(\'override\')">Override existing</button>' +
        '<button class="btn" style="width:100%;" onclick="closeModal()">Cancel</button>' +
      '</div>'
    );
    return;
  }

  await applyCellEdit(edit, 'override');
}

async function resolveCellConflict(mode){
  if(!pendingCellEdit) return;
  await applyCellEdit(pendingCellEdit, mode);
  pendingCellEdit = null;
}

async function applyCellEdit(edit, mode){
  const origAcc = getAccount(edit.origAccId);
  if(edit.origSubId){
    const s = getSub(origAcc, edit.origSubId);
    if(s) s.entries = s.entries.filter(e => e.month !== edit.origMonthKey);
  } else if(origAcc){
    origAcc.entries = origAcc.entries.filter(e => e.month !== edit.origMonthKey);
  }

  const targetAcc = getAccount(edit.targetAccId);
  const targetContainer = edit.targetSubId ? getSub(targetAcc, edit.targetSubId) : targetAcc;
  const existingAtTarget = targetContainer.entries.filter(e => e.month === edit.targetMonthKey);
  const existingTotal = existingAtTarget.reduce((s,e) => s + (Number(e.amount)||0), 0);
  const existingNotes = existingAtTarget.map(e => e.note).filter(Boolean);
  targetContainer.entries = targetContainer.entries.filter(e => e.month !== edit.targetMonthKey);

  let finalAmount = edit.amount;
  let finalNote = edit.note;
  if(mode === 'sum'){
    finalAmount = existingTotal + edit.amount;
    const notes = existingNotes.slice();
    if(edit.note) notes.push(edit.note);
    finalNote = notes.join('; ');
  }

  targetContainer.entries.push({ id: uid(), month: edit.targetMonthKey, amount: finalAmount, note: finalNote });

  await saveData();
  closeModal();
  render();
}

(async function init(){
  document.getElementById('undoFab').innerHTML = ICONS.undo;
  await loadData();
  render();
})();
</script>
